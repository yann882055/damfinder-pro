# ============================================================================
# DamFinder Pro v1.0 — GitHub Actions Build Pipeline
# Builds a standalone Windows EXE via PyInstaller on a Windows runner.
#
# Triggers:
#   - Push to main/master  → builds EXE, uploads as workflow artifact
#   - Push of a tag v*.*   → builds EXE + creates a GitHub Release with the
#                            zip as a downloadable asset
# ============================================================================

name: Build DamFinder Pro EXE

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*.*', 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest   # Windows Server 2022, 64-bit

    steps:
      # ── 1. Checkout source ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python 3.11 ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Upgrade pip / setuptools / wheel ───────────────────────────────
      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      # ── 4. Install geospatial stack (order matters) ───────────────────────
      - name: Install numpy (build-time dependency)
        run: pip install "numpy>=1.24,<2.0"

      - name: Install geospatial packages
        run: |
          pip install "pyproj>=3.5.0"
          pip install "fiona>=1.9.5"
          pip install "rasterio>=1.3.8"
          pip install "shapely>=2.0.2"
          pip install "geopandas>=0.13.2"
          pip install "pysheds>=0.3.5"
          pip install "rasterstats>=0.18.0"

      - name: Install GUI (PyQt5 + WebEngine)
        run: |
          pip install "PyQt5>=5.15.9"
          pip install "PyQtWebEngine>=5.15.6"

      - name: Install remaining dependencies
        run: pip install -r requirements.txt

      - name: Install certifi (SSL certs)
        run: pip install certifi

      # ── 5. Install PyInstaller ────────────────────────────────────────────
      - name: Install PyInstaller
        run: pip install "pyinstaller>=5.13"

      # ── 6. Build EXE ──────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller DamFinder_Pro.spec --noconfirm --clean
        env:
          PYTHONOPTIMIZE: "1"

      # ── 7. Verify EXE was produced ────────────────────────────────────────
      - name: Verify build output
        run: |
          if (!(Test-Path "dist\DamFinder_Pro\DamFinder_Pro.exe")) {
            Write-Error "EXE not found — build failed"
            exit 1
          }
          $size = (Get-Item "dist\DamFinder_Pro\DamFinder_Pro.exe").Length
          Write-Output "EXE size: $size bytes"
        shell: pwsh

      # ── 8. Zip the dist folder ────────────────────────────────────────────
      - name: Zip distribution folder
        run: |
          Compress-Archive -Path dist\DamFinder_Pro\* `
            -DestinationPath DamFinder_Pro_Windows_x64.zip
          Write-Output "Archive created:"
          Get-Item DamFinder_Pro_Windows_x64.zip | Select-Object Name, Length
        shell: pwsh

      # ── 9. Upload as workflow artifact (available on every push) ──────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DamFinder_Pro_Windows_x64
          path: DamFinder_Pro_Windows_x64.zip
          retention-days: 30

      # ── 10. Create GitHub Release (only on version tags v*) ───────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "DamFinder Pro ${{ github.ref_name }}"
          body: |
            ## DamFinder Pro ${{ github.ref_name }}

            **Standalone Windows executable — no Python or ArcGIS required.**

            ### Installation
            1. Download `DamFinder_Pro_Windows_x64.zip`
            2. Extract the **entire folder** anywhere on your PC
            3. Double-click `DamFinder_Pro.exe`

            ### Requirements
            - Windows 10 / 11 (64-bit)
            - No additional software needed

            ### Methodology
            ICOLD standards + World Bank ESMAP hydropower guidelines

            ---
            *Built automatically by GitHub Actions — [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          files: DamFinder_Pro_Windows_x64.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
